# Default-sink preference order (higher priority.session wins when several are present):
#   1. OPPO HA-1 DAC
#   2. Any Bluetooth headphones/earbuds/speaker
#   3. Internal analog (3.5mm jack / laptop speakers)

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "alsa_output.usb-OPPO_OPPO_HA-1_USB_AUDIO_2.0_DAC-00.analog-stereo" }
    ]
    actions = { update-props = { priority.session = 5000 } }
  }
  {
    matches = [
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Headphones__sink" }
    ]
    actions = { update-props = { priority.session = 3000 } }
  }
]

monitor.bluez.rules = [
  {
    # Any Bluetooth output device (headphones, earbuds, speaker, ...).
    # Every BT sink node is named "bluez_output.<MAC>.<profile>".
    matches = [
      { node.name = "~bluez_output\\..*" }
    ]
    actions = { update-props = { priority.session = 4000 } }
  }
]
